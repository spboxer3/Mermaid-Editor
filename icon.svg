<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDF8F0"/>
      <stop offset="100%" stop-color="#EDE6D9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#3D3929" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" fill="url(#bg)" stroke="#C96442" stroke-width="4"/>

  <!-- Top node (rounded rect) -->
  <rect x="88" y="36" width="80" height="40" rx="10" ry="10" fill="#C96442" filter="url(#shadow)"/>

  <!-- Middle diamond (decision) -->
  <g transform="translate(128, 128)" filter="url(#shadow)">
    <polygon points="0,-32 38,0 0,32 -38,0" fill="#3D3929"/>
  </g>

  <!-- Bottom-left node -->
  <rect x="32" y="184" width="72" height="38" rx="10" ry="10" fill="#C96442" filter="url(#shadow)"/>

  <!-- Bottom-right node -->
  <rect x="152" y="184" width="72" height="38" rx="10" ry="10" fill="#C96442" filter="url(#shadow)"/>

  <!-- Connector lines -->
  <g stroke="#9B917D" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top node down to diamond -->
    <line x1="128" y1="76" x2="128" y2="96"/>
    <!-- Diamond down-left to bottom-left -->
    <line x1="90" y1="128" x2="68" y2="184"/>
    <!-- Diamond down-right to bottom-right -->
    <line x1="166" y1="128" x2="188" y2="184"/>
  </g>

  <!-- Arrow heads -->
  <g fill="#9B917D">
    <!-- Arrow into diamond -->
    <polygon points="128,96 123,88 133,88"/>
    <!-- Arrow to bottom-left -->
    <polygon points="68,184 63,175 73,175"/>
    <!-- Arrow to bottom-right -->
    <polygon points="188,184 183,175 193,175"/>
  </g>
</svg>
